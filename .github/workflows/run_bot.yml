import os
import requests
import time
import sys

# دریافت توکن‌ها از Secrets
GEMINI_KEY = os.getenv("GEMINI_KEY")
BALE_TOKEN = os.getenv("BALE_TOKEN")

def get_gemini_response(user_text):
    try:
        # استفاده از مدل latest که در تمام ریجن‌ها پایدار است
        model = "gemini-1.5-flash-latest"
        url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={GEMINI_KEY}"
        
        headers = {'Content-Type': 'application/json'}
        payload = {"contents": [{"parts": [{"text": user_text}]}]}
        
        print(f"--- Sending to Google: {model} ---", flush=True)
        response = requests.post(url, json=payload, headers=headers, timeout=15)
        res_json = response.json()
        
        if response.status_code == 200:
            return res_json['candidates'][0]['content']['parts'][0]['text']
        elif response.status_code == 429:
            return "سهمیه رایگان گوگل در این دقیقه تمام شده. کمی صبر کنید."
        else:
            error_msg = res_json.get('error', {}).get('message', 'Unknown Error')
            print(f"!!! API Error: {error_msg}", flush=True)
            return f"خطای گوگل: {error_msg}"
    except Exception as e:
        print(f"!!! Connection Error: {e}", flush=True)
        return "خطا در برقراری ارتباط با هوش مصنوعی."

def send_message(chat_id, text):
    url = f"https://tapi.bale.ai/bot{BALE_TOKEN}/sendMessage"
    try:
        requests.post(url, json={"chat_id": chat_id, "text": text}, timeout=10)
    except:
        pass

def bot_loop():
    last_update_id = 0
    print("--- ربات در گیت‌هاب فعال شد ---", flush=True)
    
    start_time = time.time()
    # اجرای مداوم برای حدود ۶ ساعت
    while time.time() - start_time < 21000: 
        try:
            url = f"https://tapi.bale.ai/bot{BALE_TOKEN}/getUpdates?offset={last_update_id + 1}&timeout=20"
            resp = requests.get(url, timeout=30)
            res = resp.json()
            
            if res.get("ok") and res.get("result"):
                for update in res["result"]:
                    last_update_id = update["update_id"]
                    if "message" in update and "text" in update["message"]:
                        chat_id = update["message"]["chat"]["id"]
                        text = update["message"]["text"]
                        print(f"پیام جدید دریافت شد: {text[:10]}", flush=True)
                        reply = get_gemini_response(text)
                        send_message(chat_id, reply)
                        print("پاسخ ارسال شد.", flush=True)
        except Exception as e:
            print(f"Loop Error: {e}", flush=True)
            time.sleep(5)
        time.sleep(1)

if __name__ == "__main__":
    bot_loop()
