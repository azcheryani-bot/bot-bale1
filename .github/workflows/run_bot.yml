name: Bale Gemini Bot

on:
  workflow_dispatch: # اجازه اجرای دستی
  schedule:
    # اجرا در ساعت‌های 00:00, 06:00, 12:00, 18:00 به وقت UTC
    - cron: '0 */6 * * *'
  push:
    branches: [ main ] # هر زمان که کد را آپدیت کردید هم یکبار اجرا شود

# جلوگیری از اجرای همزمان دو نسخه از ربات (بسیار مهم برای ربات‌های تلگرام/بله)
concurrency:
  group: bale-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # تعیین حداکثر زمان مجاز اجرا توسط گیت‌هاب (کمی بیشتر از تایمر داخلی پایتون)
    timeout-minutes: 360 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Bot
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
        # اجرای اسکریپت اصلی
        run: python main.py
